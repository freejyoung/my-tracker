<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Tracker</title>
    
    <link rel="apple-touch-icon" href="https://rebrand.ly/time-icon-png">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #F0F2F5; display: flex; flex-direction: column; align-items: center; padding: 20px; -webkit-tap-highlight-color: transparent; }
        .card { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .clock { font-size: 40px; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .status { font-weight: bold; color: #1A73E8; margin-bottom: 20px; font-size: 18px; }
        .timer-box { background: #F8F9FA; padding: 12px; border-radius: 12px; margin-top: 10px; }
        .timer-label { font-size: 11px; color: #888; font-weight: bold; letter-spacing: 0.5px; }
        .timer-value { font-size: 26px; font-weight: bold; color: #4285F4; font-family: monospace; }
        button { width: 100%; padding: 18px; margin: 6px 0; border: none; border-radius: 15px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .in { background-color: #34A853; }
        .meal { background-color: #FBBC05; }
        .out { background-color: #EA4335; }
        .reset { background-color: #5F6368; }
        .history { text-align: left; font-size: 14px; margin-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #F0F0F0; }
    </style>
</head>
<body>
    <div class="card">
        <div id="date" style="color: #777; font-size: 14px;"></div>
        <div id="clock" class="clock">00:00:00</div>
        <div id="status" class="status">IDLE</div>
        
        <div class="timer-box">
            <div class="timer-label">WORK DURATION</div>
            <div id="work-timer" class="timer-value">00:00:00</div>
        </div>
        <div id="meal-box" class="timer-box" style="display:none; background-color: #FFF9E6;">
            <div class="timer-label" style="color: #F29900;">MEAL DURATION</div>
            <div id="meal-timer" class="timer-value" style="color: #F29900;">00:00:00</div>
        </div>
    </div>

    <div id="buttons" style="width: 90%; max-width: 400px;"></div>

    <div class="card history">
        <strong style="display: block; margin-bottom: 10px;">Today's Log</strong>
        <div class="history-item"><span>IN</span> <span id="log-in">--:--</span></div>
        <div class="history-item"><span>MEAL</span> <span id="log-meal">--:--</span></div>
        <div class="history-item"><span>OUT</span> <span id="log-out">--:--</span></div>
    </div>

    <script>
        let status = 'IDLE';
        let logs = { in: null, mealS: null, mealE: null, out: null };

        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
            
            if (status !== 'IDLE') {
                document.getElementById('work-timer').innerText = calculateWork(now);
                if (status === 'MEAL' || (logs.mealS && logs.mealE)) {
                    document.getElementById('meal-box').style.display = 'block';
                    document.getElementById('meal-timer').innerText = calculateMeal(now);
                }
            }
            renderButtons();
        }

        function calculateWork(now) {
            let end = (status === 'DONE') ? new Date(logs.out) : (status === 'MEAL') ? new Date(logs.mealS) : now;
            let mealDiff = (logs.mealS && logs.mealE) ? (new Date(logs.mealE) - new Date(logs.mealS)) : 0;
            return formatDiff((new Date(end) - new Date(logs.in)) - mealDiff);
        }

        function calculateMeal(now) {
            let end = (logs.mealE) ? new Date(logs.mealE) : now;
            return formatDiff(new Date(end) - new Date(logs.mealS));
        }

        function formatDiff(ms) {
            if (ms < 0) ms = 0;
            const h = Math.floor(ms / 3600000).toString().padStart(2, '0');
            const m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function handleAction(type) {
            const time = new Date();
            const timeStr = time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            
            if (type === 'IN') { 
                logs.in = time; status = 'WORKING'; 
                document.getElementById('log-in').innerText = timeStr; 
            }
            else if (type === 'MS') { 
                logs.mealS = time; status = 'MEAL'; 
            }
            else if (type === 'ME') { 
                logs.mealE = time; status = 'WORKING'; 
                document.getElementById('log-meal').innerText = `${new Date(logs.mealS).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false})} - ${timeStr}`; 
            }
            else if (type === 'OUT') { 
                logs.out = time; status = 'DONE'; 
                document.getElementById('log-out').innerText = timeStr; 
            }
            else if (type === 'RESET') { 
                location.reload(); 
            }
            document.getElementById('status').innerText = status;
        }

        function renderButtons() {
            const container = document.getElementById('buttons');
            let html = '';
            if (status === 'IDLE') html = `<button class="in" onclick="handleAction('IN')">CLOCK-IN</button>`;
            else if (status === 'WORKING') html = `<button class="meal" onclick="handleAction('MS')">MEAL START</button><button class="out" onclick="handleAction('OUT')">CLOCK-OUT</button>`;
            else if (status === 'MEAL') html = `<button class="meal" onclick="handleAction('ME')">MEAL END</button><button class="out" onclick="handleAction('OUT')">CLOCK-OUT</button>`;
            else if (status === 'DONE') html = `<button class="reset" onclick="handleAction('RESET')">NEW LOG</button>`;
            container.innerHTML = html;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
